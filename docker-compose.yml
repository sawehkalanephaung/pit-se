version: "3.9"

services:
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_PORT=5173
    # no depends_on needed in frontend-only stack

volumes:
  node_modules:
